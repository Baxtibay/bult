  function normalizeText(text) {
    return text
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
  }

  function renderResults(data) {
    resultsList.innerHTML = ''
    data.forEach(qa => {
      const li = document.createElement('li')
      li.innerHTML = `<span>${qa.question}</span><br>${qa.answer}`
      resultsList.appendChild(li)
    })
    resultsDiv.style.display = 'block'
  }

  // 🔹 MOBILDA – hamma savollar chiqadi
  if (window.innerWidth <= 500) {
    renderResults(questionsAndAnswers)
  }

  // 🔹 QIDIRUV
  searchInput.addEventListener('input', () => {
    const query = normalizeText(searchInput.value)

    // mobil bo‘lsa – yashirmaymiz
    if (window.innerWidth <= 500 && query.trim() === '') {
      renderResults(questionsAndAnswers)
      return
    }

    if (query.trim() === '') {
      resultsDiv.style.display = 'none'
      return
    }

    const filteredResults = questionsAndAnswers.filter(qa =>
      normalizeText(qa.question).includes(query)
    )

    if (filteredResults.length > 0) {
      renderResults(filteredResults)
    } else {
      resultsDiv.style.display = 'none'
    }

  })
  
  clearIcon.addEventListener('click', () => {
    searchInput.value = ''
    renderResults(questionsAndAnswers)
  })
